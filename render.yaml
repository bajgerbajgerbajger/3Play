services:
  # Backend API Service
  - type: web
    name: threeplay-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLIENT_URL
        value: https://threeplay.onrender.com
      - key: TRUSTED_IP_RANGES
        value: 74.220.51.0/24,74.220.59.0/24
        comment: Email service provider IP ranges for SMTP and webhooks

  # Frontend Web App (Vite/React) - Static Site
  - type: web
    name: threeplay
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://threeplay-api.onrender.com/api
